<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Event Gallery</h2>

    <div id="galleryCarousel" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="2"></button>
            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="3"></button>
            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="4"></button>
        </div>

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://via.placeholder.com/1200x500?text=Technical+Quiz"
                     class="d-block w-100" alt="Technical Quiz">
            </div>

            <div class="carousel-item">
                <img src="https://via.placeholder.com/1200x500?text=Hackathon"
                     class="d-block w-100" alt="Hackathon">
            </div>

            <div class="carousel-item">
                <img src="https://tse2.mm.bing.net/th/id/OIP.pImRfp3050hxUJwV1OqmHAHaFE?pid=Api&P=0&h=180"
                     class="d-block w-100" alt="Poster Presentation">
            </div>

            <div class="carousel-item">
                <img src="https://files.autoblogging.ai/images/corporate-event-photography(nwno).jpg"
                     class="d-block w-100" alt="Coding Contest">
            </div>

            <div class="carousel-item">
                <img src="https://elevationeventphotography.com/wp-content/uploads/2023/05/Cover-Photo-1.jpg"
                     class="d-block w-100" alt="Cultural Fest">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#galleryCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#galleryCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
