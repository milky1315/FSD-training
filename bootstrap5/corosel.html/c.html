<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Carousel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div id="demo" class="carousel slide" data-bs-ride="carousel">

    <!-- Indicators -->
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
    </div>

    <!-- Images -->
    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="https://images6.alphacoders.com/402/402163.jpg"
                 class="d-block w-100"
                 alt="Image 1">
        </div>

        <div class="carousel-item">
            <img src="https://wallpaperaccess.com/full/394297.jpg"
                 class="d-block w-100"
                 alt="Image 2">
        </div>

        <div class="carousel-item">
            <img src="https://www.creativefabrica.com/wp-content/uploads/2023/04/02/Nature-Background-Graphics-66003217-1.jpg"
                 class="d-block w-100"
                 alt="Image 3">
        </div>

    </div>

    <!-- Previous Button -->
    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#demo"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

    </button>

    <!-- Next Button -->
    <button class="carousel-control-next"
            type="button"
            data-bs-target="#demo"
            data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
