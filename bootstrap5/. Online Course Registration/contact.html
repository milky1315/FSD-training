<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <h1 class="navbar-brand fw-bold fs-4" href="#">
            Training Institute
        </h1>
    </div>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>


<div class="container my-5">
    <h1 class="text-center text-success fw-bold mb-4">
        Contact Us
    </h1>

    <div class="row g-4">

        <!-- Contact Form -->
        <div class="col-md-6">
            <div class="card border border-danger border-3 shadow">
                <div class="card-body">

                    <h3 class="mb-3">Send Message</h3>

                    <form>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="4"></textarea>
                        </div>

                        <button type="submit" class="btn btn-success">
                            Send Message
                        </button>

                    </form>

                </div>
            </div>
        </div>

        <!-- Google Map Placeholder -->
        <div class="col-md-6">
            <div class="card border border-primary border-3 shadow h-100">
                <div class="card-body text-center">

                    <h3>Location Map</h3>

                    <div class="border p-5 mt-4 bg-light">
                        Google Map Placeholder
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- Address Information -->
    <div class="card shadow mt-5">
        <div class="card-body text-center bg-dark">

            <h3 class="text-success">Address Information</h3>

            <p class="text-white"><strong>Institute Name:</strong> Training Institute</p>
            <p class="text-white"><strong>Address:</strong> Hyderabad, Telangana</p>
            <p class="text-white"><strong>Phone:</strong> +91 9876543210</p>
            <p class="text-white"><strong>Email:</strong> info@traininginstitute.com</p>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
