<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-8">
            <div class="card bg-info">
                <div class="card-header text-white text-center me-0 bg-warning">
                    <h2>Student Registration</h2>
                </div>
                <div class="card-body">
                <form class="needs-validation" >
                    <div class="mb-3">
                    <label class="form-label"> Full name :  </label>
                    <input type="text"
                    class="form-control"
                    placeholder="Enter full name"
                    required>
                    </div>

                    <div class="mb-3">
                    <label class="form-label"> Roll Number :  </label>
                    <input type="text"
                    class="form-control"
                    placeholder="Enter roll number"
                    required>
                    </div>

                    <div class="mb-3">
                     <label class="form-label"> E mail :  </label>
                    <input type="email"
                    class="form-control"
                    placeholder="@gmail.com"
                    required>
                    </div>

                    <div class="mb-3">
                    <label class="form-label"> Enter mobile number:  </label>
                    <input type="tel"
                    pattern="[0-9]{10}"
                    class="form-control"
                    placeholder="mobile number"
                    required>
                    </div>

                    <div class="mb-3">
                    <label class="form-label"> Gender:  </label>
                    <select class="form-select" >
                        <option value="">select option</option>
                        <option>Male</option>
                         <option>FeMale</option>
                          <option>other</option>
                    </select>
                   </div>

                   <div class="mb-3">
                    <label class="form-label"> Branch:  </label>
                    <select class="form-select">
                        <option value="">select option</option>
                        <option>CSE</option>
                         <option>ECE</option>
                          <option>AIML</option>
                    </select>
                   </div>

                    <div class="mb-3">
                    <label class="form-label"> DOB </label>
                    <input type="date"
                    pattern="[0-9]{10}"
                    class="form-control"
                    placeholder=""
                    required>
                    </div>

                    <div class="mb-3">
                    <label class="form-label"> Enter Address:  </label>
                    <textarea 
                    class="form-control"
                    rows="3"
                    placeholder="Address"
                    required></textarea>
                    </div>

                    <div class="mb-3">
                    <label class="form-label"> Upload photo:  </label>
                    <input type="file"            
                    class="form-control"                
                    required>
                    </div>
                    <div class="text-center">
                    <button class="btn btn-outline-primary me-2">Submit</button>
                    <button class="btn btn-outline-success me-2">Reset</button>

                  </div>

                </form>
                </div>
            </div>
        </div>
        </div>
    </div>
</body>
</html>
