<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
    section{
        background-color: white;
        border-radius: 20px;
        margin: 20px;
        padding: 20px;
        width: 90%;
        box-shadow: 0px 0px 5px rgb(9, 162, 50);
    }
    header{
        text-align: center;
        color:rgb(205, 7, 175) ;
    }
    h3{
        color: rgb(147, 90, 221);
    }
    button{
        background-color: rgb(219, 94, 219);
        width: 100px;
        height: 50px;
    }
    .btn{
        text-align: center;
    }
   </style>
</head>
<body>
    <header>
        <h1>Society Survey Page</h1>
    </header>
    <section>
        <h3>cleanliness satisfaction</h3>
        <input type="radio" name="clean">Excellent

        <input type="radio" name="clean">Average
        <input type="radio" name="clean">poor

    <section>
        <h3>Security service feedback</h3>
        <input type="radio" name="feed">Excellent
        <input type="radio" name="feed">Good
        <input type="radio" name="feed">Average
        <input type="radio" name="feed">poor
    </section>

    <section>
       <h3>parking issues</h3>
       <h3>Security service feedback</h3>
        <input type="checkbox" name="security">Excellent
        <input type="checkbox" name="security">Good
        <input type="checkbox" name="security">Average
        <input type="checkbox" name="security">poor
    </section>
    <section>
        <h3>Water supply feedback</h3>
        <select>
            <option>excellent</option>
            <option>good</option>
            <option>average</option>
            <option>poor</option>
        </select>
    </section>
<section>
    <h3>5. Maintenance Quality</h3>
        <input type="radio" name="maintenance"> Excellent
        <input type="radio" name="maintenance"> Good
        <input type="radio" name="maintenance"> Average
        <input type="radio" name="maintenance"> Poor
</section>
<section>
        <h3>6. Suggestions</h3>
        <textarea placeholder="Enter your suggestions here..."></textarea>
</section>

<button>SUBMIT</button>

</html>
